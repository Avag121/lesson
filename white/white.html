<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Mode</title>
    <link rel="stylesheet" href="White.css">
</head>

<body>
    <main>
        <div class="sh">
            <div class="shw">
                <article id="switch">
                    <a href="black.html">Black Mode</a>
                </article>
                <article id="history">
                    <img src="images/History.png" alt="">
                </article>
            </div>
            <p class="pp">1.000 x 2 + 2 x 2</p>
            <div class="otv">
                <div class="rar">
                    <p>=</p>
                    <p>2004</p>
                </div>
            </div>

        </div>

        <div class="calculator">
            <div class="left">
                <article class="top">
                    <p>AC</p>
                    <p>+/-</p>
                    <p>%</p>
                </article>
                <article class="bottom">
                    <div class="first">
                        <article>
                            <p>1</p>
                            <p>4</p>
                            <p>7</p>
                            <p>.</p>
                        </article>
                    </div>
                    <div class="second">
                        <article>
                            <p>2</p>
                            <p>5</p>
                            <p>8</p>
                            <p>0</p>
                        </article>
                    </div>
                    <div class="third">
                        <article>
                            <p>3</p>
                            <p>6</p>
                            <p>9</p>
                            <p>00</p>
                        </article>
                    </div>
                </article>
            </div>


            <div class="right">
                <article>
                    <p>÷</p>
                    <p>x</p>
                    <p>-</p>
                    <p>+</p>
                    <p>=</p>
                </article>
            </div>


        </div>

    </main>
</body>

</html>
